name: paprika
description: A new Flutter application.

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# Read more about versioning at semver.org.
version: 1.5.4+2

environment:
  sdk: ">=2.1.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^0.5.12+4
  flutter_picker: ^1.1.5
  audioplayers: ^0.17.0
  url_launcher: ^5.7.10
  share: ^0.6.5+4
  shimmer: ^1.1.2
  google_maps_flutter: ^1.0.6
  transparent_image: ^1.0.0
  cached_network_image: ^2.3.3
  fluttertoast: ^7.1.1
  intl: ^0.16.1
  flutter_spinkit: ^4.1.2+1
  photo_view: ^0.10.3
  firebase_messaging: ^7.0.3
  location: ^3.2.4
  app_settings: ^4.0.4
  connectivity: ^2.0.2
  image_picker: ^0.6.7+22
  flutter_facebook_login: ^3.0.0
  google_sign_in: ^4.5.6
  sqflite: ^1.3.2+1
  uni_links: ^0.4.0
  flutter_launcher_icons: ^0.8.1
  swagger:
    path: paprica_dart_client
  font_awesome_flutter: ^8.10.0
  convex_bottom_bar: ^2.6.0
  paprika_inside:
    path: ./paprika_inside

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.0
  percent_indicator: ^2.1.8
  circular_check_box: ^1.0.4
  flutter_svg: ^0.19.1
  package_info: ^0.4.3+4
  flutter_local_notifications:
  incrementally_loading_listview:

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/launcher_icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://www.dartlang.org/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icons/
    - assets/images/


      # An image asset can refer to one or more resolution-specific "variants", see
      # https://flutter.io/assets-and-images/#resolution-aware.

      # For details regarding adding assets from package dependencies, see
      # https://flutter.io/assets-and-images/#from-packages


      # To add custom fonts to your application, add a fonts section here,
      # in this "flutter" section. Each entry in this list should have a
      # "family" key with the font family name, and a "fonts" key with a
      # list giving the asset and other descriptors for the font. For
      # example:
      # fonts:
      #   - family: Schyler
      #     fonts:
      #       - asset: fonts/Schyler-Regular.ttf
      #       - asset: fonts/Schyler-Italic.ttf
      #         style: italic
    #   - family: Trajan Pro
    #     fonts:
    #       - asset: fonts/TrajanPro.ttf
    #       - asset: fonts/TrajanPro_Bold.ttf
    #         weight: 700
  #
  fonts:
    - family: FrutigerLTArabicLight
      fonts:
        - asset: fonts/frutiger_ltarabic_roman.ttf
          style: normal
    - family: hacen-tunisia
      fonts:
        - asset: fonts/Hacen-Tunisia-Lt.ttf
          style: normal